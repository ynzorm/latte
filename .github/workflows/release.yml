name: 'Release'

permissions:
  contents: read

on:
  push:
    tags:
      - '*'

env:
  RUSTFLAGS: "--cfg fetch_extended_version_info --cfg tokio_unstable"

jobs:
  verify_version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Verify tag matches Cargo.toml version
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" != "$CARGO_VERSION" ]]; then
            echo "::error::Tag '$TAG' does not match Cargo.toml version '$CARGO_VERSION'"
            exit 1
          fi

  get_tag:
    needs: [verify_version]
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
      - name: Get Tag
        uses: olegtarasov/get-tag@45e6ac666e58c4737f7f0d22a2aabf67a7b36c0d # v2.1.3
        id: version_tag
        with:
          tagRegex: "(.*)"

  release:
    needs: [verify_version]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
        run: |
          set +e
          if [[ "$(gh release view $tag 2>&1)" == "release not found" ]]; then
            echo "Release '$tag' not found. Creating..."
            gh release create "$tag" \
                --repo="$GITHUB_REPOSITORY" \
                --title="${GITHUB_REPOSITORY#*/} ${tag#}" \
                --generate-notes
          else
            echo "Release '$tag' found. Skipping this step..."
          fi

  docker_build:
    uses: ./.github/workflows/docker.yml
    needs: [get_tag]
    with:
      version: ${{ needs.get_tag.outputs.tag }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  release-artifacts:
    needs: [get_tag, release]
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, ubuntu-26.04, ubuntu-26.04-arm]
        variant:
          - name: latte
            args: --release
            binary: latte
          - name: latte-alternator
            args: --release --no-default-features --features alternator
            binary: latte-alternator
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1

      - name: Build Binary
        uses: actions-rs/cargo@844f36862e911db73fe0815f00a4a2602c279505 # v1.0.3
        with:
          command: build
          args: ${{ matrix.variant.args }}

      - name: Set Binary Name
        id: set_binary_name
        run: |
          BIN_NAME="${{ matrix.variant.name }}-${{ needs.get_tag.outputs.tag }}--${{ matrix.os }}"
          echo "BIN_NAME=$BIN_NAME" >> $GITHUB_ENV
        shell: bash

      - name: Get Release Upload URL
        id: get_upload_url
        run: |
          UPLOAD_URL=$(gh release view ${{ needs.get_tag.outputs.tag }} --json uploadUrl -q '.uploadUrl' | sed 's/{.*//')
          echo "UPLOAD_URL=$UPLOAD_URL" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset
        uses: actions/upload-release-asset@e8f9f06c4b078e705bd2ea027f0926603fc9b4d5 # v1.0.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ env.UPLOAD_URL }}?name=${{ env.BIN_NAME }}
          asset_path: ./target/release/${{ matrix.variant.binary }}
          asset_name: ${{ env.BIN_NAME }}
          asset_content_type: application/octet-stream
